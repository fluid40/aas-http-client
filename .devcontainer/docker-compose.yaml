services:
  dotnet_repo_server:
    image: engineeringmethodsag/fluid-basyx-dotnet-repo-server:latest
    container_name: dotnetaasserver
    networks:
      - bridge
    ports:
      - "5043:5043"

  python_aas_server:
    image: engineeringmethodsag/fluid-basyx-python-aasx-server:latest
    container_name: pythonaasserver
    networks:
      - bridge
    ports:
      - "5080:80"
    environment:
      - API_BASE_PATH=/
      - STORAGE_TYPE=LOCAL_FILE_READ_ONLY
      - STORAGE_PATH=/storage
    volumes:
      - ./storage/python_server:/storage

  mongo:
    image: mongo:4.4
    container_name: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoAdmin
      MONGO_INITDB_ROOT_PASSWORD: mongoPassword
    volumes:
      - mongo_data:/data/db
    restart: always
    healthcheck:
      test: mongo
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bridge

  aas-registry:
    image: eclipsebasyx/aas-registry-log-mongodb:2.0.0-milestone-09
    container_name: aas-registry
    environment:
      - SERVER_PORT=8080
    volumes:
      - ./basyx/aas-registry.yml:/workspace/config/application.yml
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8076:8080"
    networks:
      - bridge

  sm-registry:
    image: eclipsebasyx/submodel-registry-log-mongodb:2.0.0-milestone-09
    container_name: sm-registry
    environment:
      - SERVER_PORT=8080
    volumes:
      - ./basyx/sm-registry.yml:/workspace/config/application.yml
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8077:8080"
    networks:
      - bridge

  java_aas_environment:
    image: eclipsebasyx/aas-environment:2.0.0-milestone-09
    container_name: javaaasserver
    networks:
      - bridge
    ports:
      - "8075:8075"
    environment:
      - SERVER_PORT=8075
      - SERVER_HOST=javaaasserver
    volumes:
      - ./aas:/application/aas
      - ./basyx/aas-env.properties:/application/application.properties
    depends_on:
      aas-registry:
        condition: service_healthy
      sm-registry:
        condition: service_healthy
      mongo:
        condition: service_healthy

  postgres:
    container_name: postgres
    image: postgres:18
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: basyxTestDB
    command: ["postgres", "-c", "listen_addresses=*"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d basyxTestDB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - bridge
    restart: unless-stopped

  go_aas_configuration:
    container_name: aas_basyx_configuration
    image: eclipsebasyx/basyxconfigurationservice-go:latest
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DBNAME=basyxTestDB
      - POSTGRES_MAXOPENCONNECTIONS=500
      - POSTGRES_MAXIDLECONNECTIONS=500
      - POSTGRES_CONNMAXLIFETIMEMINUTES=5
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bridge
    restart: "no"

  go_aas_environment:
    container_name: goaasserver
    image: eclipsebasyx/aasenvironment-go:latest
    command: ["/app/aasenvironmentservice"]
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - CORS_ALLOWEDORIGINS=*
      - CORS_ALLOWEDHEADERS=*
      - CORS_ALLOWEDCREDENTIALS=true
      - CORS_ALLOWEDMETHODS=GET,POST,PUT,PATCH,DELETE,OPTIONS
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DBNAME=basyxTestDB
      - POSTGRES_MAXOPENCONNECTIONS=500
      - POSTGRES_MAXIDLECONNECTIONS=500
      - POSTGRES_CONNMAXLIFETIMEMINUTES=5
      - ABAC_ENABLED=false
      - GENERAL_AASREGISTRYINTEGRATION=true
      - GENERAL_SUBMODELREGISTRYINTEGRATION=true
      - GENERAL_DISCOVERYINTEGRATION=true
      - GENERAL_EXTERNALURL=http://localhost:8082
      - GENERAL_AAS_PRECONFIG_PATHS=/app/preconfiguration
    volumes:
      - ./preconfiguration:/app/preconfiguration:ro
    depends_on:
      go_aas_configuration:
        condition: service_completed_successfully
    networks:
      - bridge
    restart: unless-stopped

  dev_container:
    build: .
    container_name: aas-http-client-devcontainer
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    networks:
      - bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"
networks:
  bridge:

volumes:
  mongo_data:
  postgres_data:
